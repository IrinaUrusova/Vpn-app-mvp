name: API Smoke Check

on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/**'
      - 'scripts/smoke_api.sh'
      - '.github/workflows/api-smoke.yml'
  schedule:
    - cron: '17 6 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run API smoke
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
          SMOKE_USER_ID: smoke-android
        run: |
          if [ -z "${API_BASE_URL}" ] || [ -z "${API_BEARER_TOKEN}" ]; then
            echo "Missing required secrets: API_BASE_URL and/or API_BEARER_TOKEN"
            exit 1
          fi
          bash scripts/smoke_api.sh
